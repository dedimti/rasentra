# RaSenTra default experiment configuration
data:
  universe: sp500
  start_date: "2014-01-01"
  end_date: "2023-12-31"
  news_source: fnspid

sentiment:
  model: ProsusAI/finbert
  decay_halflife_days: 3.0      # temporal-decay weighting (Eq. 3)
  confidence_weighting: true    # Eq. 2
  dispersion_penalty: 0.5       # Eq. 4

regime:
  n_states: 3                   # bull / bear / high-volatility
  covariance_type: full
  features: [returns, realized_vol, volume_z]
  regime_weights: [1.0, 0.4, 0.2]   # sentiment trust per regime (Eq. 5)

decision:
  vol_target: 0.10              # annualized volatility target (Eq. 6)
  max_position: 0.20
  stop_loss_atr_mult: 2.0
  max_gross_exposure: 1.0

backtest:
  transaction_cost_bps: 5.0
  slippage_bps: 2.0
  rebalance: daily
  seed: 42
